server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: hotel-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/atlas}

  task:
    scheduling:
      pool:
        # Headroom so a long outbox drain cycle can't starve the other @Scheduled jobs.
        size: ${SCHEDULER_POOL_SIZE:3}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        spring.json.add.type.headers: 'false'
        # The outbox relay dispatches a whole poll batch before flushing (ADR-0013); let the
        # producer accumulate those sends briefly and ship them in few broker round-trips.
        linger.ms: 20
        batch.size: 65536

clients:
  inventory:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:8080}

atlas:
  outbox:
    # Adaptive relay scheduling (ADR-0013): poll fast under load, back off when idle.
    min-interval-ms: ${OUTBOX_MIN_INTERVAL_MS:250}
    max-interval-ms: ${OUTBOX_MAX_INTERVAL_MS:5000}
    max-drain-loops: ${OUTBOX_MAX_DRAIN_LOOPS:10}

management:
  server:
    port: 9090
  tracing:
    baggage:
      remote-fields:
        - correlationId
      correlation:
        fields:
          - correlationId
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://tempo.atlas-observability:4318/v1/traces}
  metrics:
    distribution:
      # Native Prometheus histogram buckets for HTTP server timings, so Grafana can compute
      # p95/p99 and draw per-endpoint latency heatmaps (RED / APM). Roadmap Phase 6/7.
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, resync
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    com.atlas: INFO
    org.springframework.security: WARN
